<!DOCTYPE html>
<html lang="en">
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #1a1a2e, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #16213e, transparent 50%),
                #0a0a12;
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
  }
  .card {
    width: 920px;
    background: rgba(255,255,255,0.03);
    border-radius: 48px;
    padding: 64px;
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 32px 64px rgba(0,0,0,0.5);
    text-align: center;
  }
  .badge {
    display: inline-flex;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.8);
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 24px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  h1 {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 12px;
    letter-spacing: -0.03em;
  }
  .sub {
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
    margin-bottom: 48px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .event-details {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 48px;
  }
  .detail {
    padding: 24px;
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .detail .icon { font-size: 28px; margin-bottom: 8px; }
  .detail .label { font-size: 12px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .detail .value { font-size: 20px; font-weight: 600; }
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    margin-bottom: 32px;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    color: #0a0a12;
    padding: 18px 48px;
    border-radius: 60px;
    font-size: 20px;
    font-weight: 700;
    text-decoration: none;
  }
  .cta-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="card">
  <span class="badge">{{badge}}</span>
  <h1>{{headline}}</h1>
  <p class="sub">{{subtext}}</p>
  
  <div class="event-details">
    <div class="detail">
      <div class="icon">📅</div>
      <div class="label">Date</div>
      <div class="value">{{date}}</div>
    </div>
    <div class="detail">
      <div class="icon">📍</div>
      <div class="label">Venue</div>
      <div class="value">{{venue}}</div>
    </div>
    <div class="detail">
      <div class="icon">⏰</div>
      <div class="label">Time</div>
      <div class="value">{{time}}</div>
    </div>
  </div>
  
  <div class="divider"></div>
  
  <a class="cta-btn" href="#">{{cta_text}} →</a>
  <div class="cta-sub">{{cta_subtext}}</div>
</div>
</body>
</html>
